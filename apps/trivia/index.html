<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Atlas Quiz</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<link rel="stylesheet" href="/style.css">
</head>
<body>

<div class="conn-status" id="connStatus">connected</div>
<button class="mute-btn" id="muteBtn"></button>

<!-- LOBBY -->
<div class="screen active" id="lobby">
  <div class="dot-grid"></div>
  <div class="logo" id="gameLogo"></div>
  <p class="subtitle">Waiting for players...</p>
  <div class="room-code" id="roomCode">------</div>
  <div class="player-count" id="playerCount">0 players</div>
  <div class="player-list" id="playerList"></div>
  <div class="ready-count" id="readyCount">0 / 0 ready</div>
  <button class="btn" id="readyBtn">Ready!</button>
</div>

<!-- PREGAME -->
<div class="screen" id="pregame">
  <h2>Get Ready!</h2>
  <div class="countdown" id="pregameCountdown">3</div>
  <div class="topic-label">Topic: <strong id="topicLabel">General Knowledge</strong></div>
  <div class="subtitle" id="qCountLabel">7 questions</div>
</div>

<!-- QUESTION -->
<div class="screen" id="question-screen">
  <div class="timer-bar-container"><div class="timer-bar" id="timerBar"></div></div>
  <div class="player-strip" id="playerStrip"></div>
  <div class="q-counter" id="qCounter">1 / 7</div>
  <div class="countdown-overlay" id="countdownOverlay"></div>
  <div class="q-text" id="qText">Loading question...</div>
  <div class="options-grid" id="optionsGrid"></div>
  <button class="btn leave-btn" id="leaveBtn">Leave Game</button>
</div>

<!-- REVEAL -->
<div class="screen" id="reveal">
  <div class="reveal-question" id="revealQuestion"></div>
  <div class="score-popup" id="scorePopup"></div>
  <div class="streak-text" id="streakText"></div>
  <div class="reveal-options" id="revealOptions"></div>
  <div class="fun-fact" id="funFact"></div>
  <div class="commentary" id="commentaryText"></div>
  <button class="btn leave-btn leave-btn-extra" onclick="send({type:'leave'})">Leave Game</button>
</div>

<!-- LEADERBOARD -->
<div class="screen" id="leaderboard-screen">
  <h2 id="lbTitle">Leaderboard</h2>
  <div class="subtitle" id="lbSubtitle"></div>
  <div class="standings" id="standingsList"></div>
  <button class="btn leave-btn leave-btn-extra" onclick="send({type:'leave'})">Leave Game</button>
</div>

<!-- PODIUM -->
<div class="screen" id="podium">
  <div class="dot-grid"></div>
  <div class="logo logo-sm" id="podiumLogo"></div>
  <div class="subtitle" id="podiumTopic"></div>
  <div class="podium-display" id="podiumDisplay"></div>
  <div class="your-rank" id="yourRank"></div>
  <div class="summary-text" id="summaryText"></div>
  <div class="cost-line" id="costLine"></div>
  <a href="https://www.paypal.me/PhilippLeins" target="_blank" class="btn donate-btn" id="donateBtn">Buy me tokens</a>
  <button class="btn close-btn" id="closeBtn">Close</button>
</div>

<!-- ERROR -->
<div class="screen" id="error-screen">
  <h1>Atlas Quiz</h1>
  <div class="error-msg" id="errorMsg">Something went wrong.</div>
  <p class="subtitle">Use /quiz in the group chat to start a new game!</p>
  <button class="btn close-btn" id="errorCloseBtn">Close</button>
</div>

<script src="/client.js"></script>
</body>
</html>
